<html lang="en">

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333333;
        }

        table {
            border-spacing: 0;
        }

        td {
            padding: 0;
        }

        img {
            border: 0;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f4f7f6;
            padding-bottom: 60px;
        }

        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            font-family: sans-serif;
            color: #171a1b;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .header {
            background-color: #2563eb !important;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            color: #ffffff !important;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .body-content {
            padding: 40px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1e293b !important;
        }

        .body-text {
            font-size: 16px;
            line-height: 1.6;
            color: #475569;
            margin-bottom: 30px;
        }

        .button-wrapper {
            text-align: center;
            margin: 35px 0;
        }

        .button {
            background-color: #2563eb;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 16px;
            display: inline-block;
        }

        .button:hover {
            background-color: #1d4ed8 !important;
        }

        .footer {
            background-color: #f8fafc;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }

        .alert-box {
            background-color: #f1f5f9;
            border-left: 4px solid #2563eb;
            padding: 15px 20px;
            margin: 25px 0;
            border-radius: 0 6px 6px 0;
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <br><br>
        <table class="main" width="100%">
            <tr>
                <td class="header">
                    <h1>Ticket Management System</h1>
                </td>
            </tr>
            <tr>
                <td class="body-content">
                    <div class="body-text">
                        {{ message | safe }}
                    </div>

                    {% if otp %}
                    <div class="alert-box">
                        {{ otp }}
                    </div>
                    {% endif %}

                    {% if action_link and action_text %}
                    <div class="button-wrapper">
                        <a href="{{ action_link }}" class="button">{{ action_text }}</a>
                    </div>
                    {% endif %}

                    <div class="body-text" style="margin-top: 40px; font-size: 14px;">
                        Best regards,<br>
                        <strong>The TMS Team</strong>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="footer">
                    &copy; {{ current_year }} Ticket Management System. All rights reserved.
                </td>
            </tr>
        </table>
        <br><br>
    </div>
</body>

</html>
